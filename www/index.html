"use strict";
var QWebChannelMessageTypes={signal:1,propertyUpdate:2,init:3,idle:4,debug:5,invokeMethod:6,connectToSignal:7,disconnectFromSignal:8,setProperty:9,response:10};
var QWebChannel=function(transport,initCallback){
if(typeof transport!=="object"){console.error("The QWebChannel requires a transport object");return;}
var channel=this;this.transport=transport;
function send(data){if(typeof(data)!=="string"){data=JSON.stringify(data);}channel.transport.send(data);}

this.exec=function(data,callback){if(!callback){callback=function(){};}if(data.id===undefined){data.id=channel.execId++;}channel.execCallbacks[data.id]=callback;send(data);};
this.objects={};
this.handleSignal=function(data){var object=channel.objects[data.object];if(object){object.signalEmitted(data.signal,data.args);}else{console.warn("Unhandled signal: "+data.object+"::"+data.signal);}};
this.handleResponse=function(data){if(data.id===undefined||data.id===null){console.error("invalid response message received: ",JSON.stringify(data));return;}var callback=channel.execCallbacks[data.id];if(callback){delete channel.execCallbacks[data.id];callback(data.data);}else{console.error("no callback for response message: ",JSON.stringify(data));}};
this.handlePropertyUpdate=function(data){for(var i=0;i<data.data.length;++i){var update=data.data[i];var object=channel.objects[update.object];if(object){object.propertyUpdate(update.signals,update.properties);}else{console.warn("Unhandled property update: "+update.object+"::"+update.signal);}}channel.exec({type:QWebChannelMessageTypes.idle});};
this.debug=function(message){channel.exec({type:QWebChannelMessageTypes.debug,data:message});};

};
function QObject(name,data,channel){
this.__id__=name;channel.objects[name]=this;this.__objectSignals__={};this.__propertyCache__={};var object=this;
this.unwrapQObject=function(response){if(response instanceof Array){var ret=new Array(response.length);for(var i=0;i<response.length;++i){ret[i]=object.unwrapQObject(response[i]);}return ret;}if(!(response instanceof Object))return response;if(!response["__QObject*__"]||response.id===undefined){var jObj={};for(var propName in response){jObj[propName]=object.unwrapQObject(response[propName]);}return jObj;}var objectId=response.id;if(channel.objects[objectId])return channel.objects[objectId];if(!response.data){console.error("Cannot unwrap unknown QObject "+objectId+" without data.");return;}var qObject=new QObject(objectId,response.data,channel);return qObject;};
this.signalEmitted=function(signalName,signalArgs){var connections=object.__objectSignals__[signalName];if(connections){connections.forEach(function(callback){callback.apply(callback,signalArgs);});}};
this.propertyUpdate=function(signals,propertyMap){for(var propertyName in propertyMap){object.__propertyCache__[propertyName]=propertyMap[propertyName];}for(var signalName in signals){object.signalEmitted(signalName,signals[signalName]);}};

}

<style>
:root {
  --bg: #1e1e2e; --surface: #2a2a3c; --border: #3e3e5e; --text: #e0e0f0;
  --text-secondary: #a0a0c0; --accent: #0066FF; --accent-dim: #0052cc;
  --red: #f7768e; --green: #9ece6a; --yellow: #e0af68;
  --radius: 16px; --transition: 0.2s ease;
  --icon-color: #00BBFF;
  --icon-hover-bg: #AAAAAA;
  --icon-filter: brightness(0) saturate(100%) invert(54%) sepia(76%) saturate(4793%) hue-rotate(184deg) brightness(103%) contrast(103%);
  --font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
  font-family: var(--font-family); font-weight: 600; font-size: 15px;
}
body.light {
  --bg: #f0f0f5; --surface: #ffffff; --border: #d0d0e0;
  --text: #1e1e2e; --text-secondary: #5a5a7a;
  --icon-color: #00BBFF;
  --icon-filter: brightness(0) saturate(100%) invert(54%) sepia(76%) saturate(4793%) hue-rotate(184deg) brightness(103%) contrast(103%);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: var(--font-family); }

.topbar { display: flex; align-items: center; justify-content: space-between; height: 44px; padding: 0 8px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; z-index: 101; user-select: none; -webkit-app-region: drag; }
.topbar-left { display: flex; align-items: center; gap: 0; min-width: 40px; -webkit-app-region: no-drag; }
.topbar-spacer { -webkit-app-region: drag; flex: 1; height: 44px; }
.topbar-right { display: flex; align-items: center; gap: 4px; -webkit-app-region: no-drag; }

.win-ctrl { display: flex; align-items: center; gap: 0; margin-left: 4px; }
.win-ctrl-btn { width: 36px; height: 28px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; transition: background var(--transition); }
.win-ctrl-btn:hover { background: var(--icon-hover-bg); }
.win-ctrl-btn.close-btn { background: rgba(232, 17, 35, 0.12); }
.win-ctrl-btn.close-btn:hover { background: #e81123; }
.win-ctrl-btn img { width: 16px; height: 16px; filter: var(--icon-filter); }
.win-ctrl-btn.close-btn img { filter: brightness(0) saturate(100%) invert(55%) sepia(72%) saturate(2876%) hue-rotate(326deg) brightness(101%) contrast(97%); }
.win-ctrl-btn.close-btn:hover img { filter: brightness(0) invert(1); }

.icon-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--transition), border-color var(--transition); }
.icon-btn:hover { background: var(--icon-hover-bg); border-color: var(--icon-hover-bg); }
.icon-btn img { width: 20px; height: 20px; }
.icon-btn:not(.send-btn):not(.stop-btn) img { filter: var(--icon-filter); }
.icon-btn.send-btn img { filter: brightness(0) invert(1); }
.icon-btn.stop-btn img { filter: brightness(0) invert(1); }

.plain-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; transition: background var(--transition); border-radius: 6px; }
.plain-btn img { width: 28px; height: 28px; filter: var(--icon-filter); }
.plain-btn:hover { background: var(--icon-hover-bg); }

.app { display: flex; flex: 1; overflow: hidden; position: relative; min-width: 0; }
.session-panel { flex: 0 0 200px; min-width: 160px; max-width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 8px 0; overflow: hidden; }
.session-search { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; color: var(--text); font-size: 13px; margin: 0 6px 6px 6px; }
.session-list-container { flex: 1; overflow-y: auto; padding: 0 6px; }
.session-item { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; margin: 1px 0; background: transparent; border: 1px solid transparent; border-radius: var(--radius); font-size: 13px; transition: all var(--transition); position: relative; }
.session-item.active { border-color: var(--accent); background: rgba(0,102,255,0.1); }
.session-item:hover { background: #AAAAAA; color: #1e1e2e; }

.session-info { flex: 1; overflow: hidden; }
.session-name { display: block; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-time { font-size: 10px; color: var(--text-secondary); }
.action-menu { display: none; position: absolute; right: 0; top: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px; z-index: 10; min-width: 100px; }
.action-menu button { background: none; border: none; font-size: 13px; padding: 4px 8px; cursor: pointer; display: block; width: 100%; text-align: left; }
.action-menu button:hover { background: var(--border); }
.new-session-btn { width: calc(100% - 12px); margin: 6px 6px 0 6px; padding: 8px; border: 1px dashed var(--border); border-radius: var(--radius); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; }
.new-session-btn:hover { border-color: var(--accent); color: var(--accent); }

.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); overflow: hidden; position: relative; }

.messages { flex: 1; overflow-y: auto; padding: 14px 10px 150px 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.message { max-width: 72%; min-width: 200px; padding: 12px 16px; border-radius: var(--radius); line-height: 1.6; font-size: 14px; animation: fadeIn 0.2s ease; word-break: break-word; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }
.message.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; margin-left: auto; margin-right: 0; width: 72%; max-width: 960px; padding: 16px 22px; }
.message.assistant { align-self: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 22px; margin: 0 auto; width: 72%; max-width: 960px; }
.message.system { align-self: center; background: transparent; color: var(--text-secondary); font-style: italic; font-size: 12px; }

.think-block { width: 72%; max-width: 960px; margin: 4px auto; color: #888888; font-size: 12px; text-align: left; white-space: pre-wrap; word-break: break-word; line-height: 1.6; padding: 8px 0; background: transparent; }
	.think-wrapper { width: 72%; max-width: 960px; margin: 4px auto; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: transparent; }
	.think-wrapper .think-header { display: flex; align-items: center; gap: 6px; padding: 6px 12px; cursor: pointer; user-select: none; font-size: 12px; color: #888; background: rgba(128,128,128,0.06); }
	.think-wrapper .think-header:hover { background: rgba(128,128,128,0.14); }
	.think-wrapper .think-header .toggle-arrow { display: inline-block; transition: transform 0.2s; font-size: 10px; }
	.think-wrapper.collapsed .think-header .toggle-arrow { transform: rotate(-90deg); }
	.think-wrapper.collapsed .think-body { display: none; }
	.think-wrapper .think-body { padding: 8px 12px; color: #888; font-size: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; max-height: 300px; overflow-y: auto; }
	.think-wrapper .think-body::-webkit-scrollbar { width: 4px; }
	.think-wrapper .think-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.message-actions { display: flex; align-items: center; gap: 10px; width: 72%; max-width: 960px; margin: 4px auto 12px auto; padding-left: 0; }
.message-actions button { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: background var(--transition); flex: 1; display: flex; align-items: center; justify-content: center; }
.message-actions button:hover { background: var(--icon-hover-bg); }
.message-actions img { width: 30px; height: 30px; }

.msg-end-marker { width: 72%; max-width: 960px; margin: 0 auto; text-align: center; }
.msg-end-separator { color: #666666; font-size: 12px; margin-bottom: 4px; }
.msg-end-info { color: #666666; font-size: 12px; margin-bottom: 8px; }

.message.assistant table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.message.assistant th, .message.assistant td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.message.assistant th { background: var(--surface); color: var(--accent); font-weight: 600; }

.home-screen { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; overflow: hidden; }
.home-top { flex: 0 0 35%; display: flex; align-items: center; justify-content: center; width: 100%; }
.home-bottom { flex: 1; display: flex; align-items: flex-start; justify-content: center; width: 100%; padding: 0 8vw; overflow-y: auto; min-height: 0; }
.assistant-title { font-size: 20px; color: var(--text-secondary); font-weight: 400; text-align: center; }
.task-dashboard { width: 90%; max-height: 100%; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
.task-dashboard h4 { margin-bottom: 12px; color: var(--text); display: flex; align-items: center; gap: 8px; font-size: 15px; }
.dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
.dash-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; transition: opacity 0.3s ease; }
.dash-card .card-value { font-size: 24px; font-weight: 700; color: var(--accent); transition: color 0.3s ease; }
.dash-card .card-label { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
.dash-card.warn .card-value { color: var(--yellow); }
.dash-card.crit .card-value { color: var(--red); }
.dash-section { margin-bottom: 10px; }
.dash-section h5 { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px solid var(--border); }
.task-item { padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
.task-item .task-goal { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-item .status { font-size: 10px; padding: 1px 5px; border-radius: 8px; font-weight: 600; }
.status-running { background: rgba(0,102,255,0.15); color: var(--accent); }
.status-completed { background: rgba(158,206,106,0.15); color: var(--green); }
.status-failed { background: rgba(247,118,142,0.15); color: var(--red); }
.status-pending { background: rgba(224,175,104,0.15); color: var(--yellow); }
.dash-row { display: flex; gap: 10px; }
.dash-row > * { flex: 1; }
.progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.progress-bar .fill.green { background: var(--green); }
.progress-bar .fill.yellow { background: var(--yellow); }
.progress-bar .fill.red { background: var(--red); }
.progress-bar .fill.blue { background: var(--accent); }

.input-area { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); width: 72%; max-width: 960px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 90; display: flex; flex-direction: column; transition: width 0.4s ease-in-out, max-width 0.4s ease-in-out; }
.input-area:focus-within { border-color: var(--accent); }
.input-area textarea { display: block; width: 100%; background: transparent; border: none; outline: none; color: var(--text); resize: none; font-size: 15px; line-height: 1.6; min-height: 44px; padding: 12px 12px 8px 12px; font-weight: 600; font-family: var(--font-family); transition: min-height 0.3s ease, height 0.3s ease; }
.input-area textarea::placeholder { color: var(--text-secondary); font-weight: 600; }
.input-actions { display: flex; align-items: center; padding: 0 12px 8px 12px; gap: 8px; }
.input-actions-left { display: flex; align-items: center; gap: 8px; flex: 1; }
.input-actions-right { display: flex; align-items: center; gap: 8px; }

.toggle-btn { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; white-space: nowrap; transition: all var(--transition); user-select: none; font-weight: 600; font-family: var(--font-family); }
.toggle-btn:hover { background: var(--icon-hover-bg); color: #fff; }
.toggle-btn.active { border-color: var(--accent); color: var(--accent); background: transparent; }
.toggle-btn img { width: 22px; height: 22px; filter: var(--icon-filter); }
.modal .toggle-btn, .settings-content .toggle-btn { border: none; }
.modal .toggle-btn:hover, .settings-content .toggle-btn:hover { background: var(--icon-hover-bg); }
.modal .toggle-btn.active, .settings-content .toggle-btn.active { background: rgba(0,102,255,0.1); }

.edit-actions { display: none; justify-content: center; gap: 10px; padding: 4px 0 8px 0; }
.edit-actions .toggle-btn { display: flex; align-items: center; gap: 4px; }

.right-panel { flex: 0 0 210px; min-width: 170px; max-width: 380px; overflow: hidden; z-index: 100; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
.panel-inner { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 8px; }
.panel-tabs { display: flex; gap: 2px; margin-bottom: 8px; }
.panel-tab { background: none; border: none; color: var(--text-secondary); padding: 5px 8px; cursor: pointer; border-radius: 6px; font-size: 12px; font-family: var(--font-family); display: flex; align-items: center; gap: 3px; }
.panel-tab img { width: 16px; height: 16px; }
.panel-tab.active { background: var(--accent); color: #fff; }
.panel-page { display: none; flex: 1; overflow-y: auto; }
.panel-page.active { display: block; }
.web-display { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; margin-top: 8px; flex: 1; overflow-y: auto; white-space: pre-wrap; font-size: 13px; color: var(--text-secondary); font-family: var(--font-family); }
.evo-list { font-size: 13px; max-height: 200px; overflow-y: auto; }
.todo-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
#memoryGraph { width: 100%; height: 350px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

.modal-close { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: background var(--transition); flex-shrink: 0; }
.modal-close:hover { background: var(--icon-hover-bg); }
.modal-close img { width: 24px; height: 24px; display: block; }
.modal h3 { display: flex; align-items: center; margin-bottom: 0; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.skill-modal-item, .patch-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.skill-info, .patch-info { flex: 1; }
.skill-name, .patch-name { font-weight: 600; font-size: 15px; }
.skill-desc, .patch-desc { font-size: 13px; color: var(--text-secondary); }
.skill-actions, .patch-actions { display: flex; align-items: center; gap: 8px; }
.delete-btn { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: background var(--transition); }
.delete-btn:hover { background: var(--icon-hover-bg); }
.delete-btn img { width: 24px; height: 24px; }
.switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .4s; border-radius: 20px; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--accent); }
input:checked + .slider:before { transform: translateX(16px); }

.settings-layout { display: flex; gap: 20px; min-height: 300px; max-height: 60vh; }
.settings-nav { width: 140px; min-width: 100px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
.settings-nav button { background: none; border: none; color: var(--text); padding: 6px 10px; border-radius: var(--radius); cursor: pointer; text-align: left; font-size: 14px; font-family: var(--font-family); white-space: nowrap; }
.settings-nav button.active { background: var(--accent); color: #000; }
.settings-content { flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden; }
.settings-page { display: none; }
.settings-page.active { display: block; }
.setting-row { margin-bottom: 14px; }
.setting-row label { display: block; font-size: 14px; color: var(--text-secondary); margin-bottom: 5px; }
.setting-row input, .setting-row select { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: var(--font-family); }

.btn-group-option:hover { border-color: var(--accent); }
.btn-group-option.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.model-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.model-name { font-weight: 600; }
.select-model-btn { background: none; border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-family: var(--font-family); }
.select-model-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.endpoint-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.endpoint-info { flex: 1; }

.upload-preview-item { position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }

  function initLang() {

  }

  const pinKey = 'pinnedSessions';
  const getPins = () => JSON.parse(localStorage.getItem(pinKey) || '[]');
  const setPin = (id, pinned) => {
    let pins = getPins();
    if (pinned) { if (!pins.includes(id)) pins.push(id); }
    else pins = pins.filter(pid => pid !== id);
    localStorage.setItem(pinKey, JSON.stringify(pins));
    loadSessions();
  };
  function timeAgo(ts) {
    if (!ts) return '';
    const t = L[lang];
    const diff = Date.now() - ts * 1000;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return t.justNow;
    if (mins < 60) return mins + t.minAgo;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + t.hrAgo;
    return Math.floor(hours / 24) + t.dayAgo;
  }
  function groupSessions(sessions, pinnedIds) {
    const groups = { pinned:[], today:[], yesterday:[], week:[], month:[], halfYear:[], year:[], older:[] };
    const now = Date.now();
    sessions.forEach(s => {
      if (pinnedIds.includes(s.id)) { groups.pinned.push(s); return; }
      const diff = now - (s.updated_at || s.created_at) * 1000;
      const days = diff / 86400000;
      if (days < 1) groups.today.push(s);
      else if (days < 2) groups.yesterday.push(s);
      else if (days < 7) groups.week.push(s);
      else if (days < 30) groups.month.push(s);
      else if (days < 180) groups.halfYear.push(s);
      else if (days < 365) groups.year.push(s);
      else groups.older.push(s);
    });
    return groups;
  }
  function renderSessions(groups) {
    const t = L[lang];
    sessionList.innerHTML = '';
    const draw = (title, arr) => {
      if (arr.length === 0) return;
      const ti = document.createElement('div');
      ti.style.cssText = 'font-size:14px; color:var(--text-secondary); margin:8px 0 4px;';
      ti.textContent = title;
      sessionList.appendChild(ti);
      arr.forEach(s => addSessionItem(s));
    };
    draw(t.pinned, groups.pinned); draw(t.today, groups.today); draw(t.yesterday, groups.yesterday);
    draw(t.week, groups.week); draw(t.month, groups.month); draw(t.halfYear, groups.halfYear);
    draw(t.year, groups.year); draw(t.older, groups.older);
  }
  function addSessionItem(s) {
    const t = L[lang];
    const escapedId = String(s.id).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    div.innerHTML = `
      <div class="session-info"><span class="session-name">${s.name || t.newChatDefault}</span><span class="session-time">${timeAgo(s.updated_at||s.created_at)}</span></div>
      <div class="session-actions-wrap" style="position:relative;">
        <button class="plain-btn more-btn" style="padding:2px;"><img src="ui/conceal.png" alt="${t.more}" style="width:22px;height:22px;"></button>
        <div class="action-menu">
          <button class="pin-session-btn" data-id="${escapedId}"><img src="ui/top.png" style="width:18px;height:18px;vertical-align:middle;"> ${t.pinned}</button>
          <button class="rename-btn" data-id="${escapedId}"><img src="ui/write.png" style="width:18px;height:18px;vertical-align:middle;"> ${t.rename}</button>
          <button class="delete-session-btn" data-id="${escapedId}"><img src="ui/delete.png" style="width:18px;height:18px;vertical-align:middle;"> ${t.delete}</button>
        </div>
      </div>`;
    div.querySelector('.more-btn').onclick = (e) => { e.stopPropagation(); const menu = div.querySelector('.action-menu'); menu.style.display = menu.style.display === 'none' ? 'block' : 'none'; };
    div.querySelector('.pin-session-btn').onclick = (e) => { e.stopPropagation(); setPin(s.id, !getPins().includes(s.id)); };
    div.querySelector('.rename-btn').onclick = (e) => { e.stopPropagation(); const n = prompt(t.renamePrompt)?.trim(); if (n) fetch('/api/session/rename', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({session_id:s.id, name:n}) }).finally(loadSessions); };
    div.querySelector('.delete-session-btn').onclick = (e) => { e.stopPropagation(); delSession(s.id); };
    div.onclick = (e) => { if (e.target.closest('.more-btn') || e.target.closest('.action-menu button')) return; switchSess(s.id); };
    sessionList.appendChild(div);
  }
  async function loadSessions() {
    try {
      const resp = await fetch('/api/sessions');
      let list = await resp.json();
      if (!Array.isArray(list)) list = [];
      sessionIdList = list.map(s => s.id);
      const groups = groupSessions(list, getPins());
      renderSessions(groups);
    } catch(e) { console.error(e); }
  }
  async function switchSess(id) {
    if (currentAbortController) { alert(L[lang].msgSending); return; }
    if (currentSessionId === id) return;
    if (currentSessionId && currentSessionId !== 'new') {
      sessionStorage.setItem('lastChatHTML_' + currentSessionId, messagesDiv.innerHTML);
    }
    lastSessionId = currentSessionId;
    currentSessionId = id;
    await fetch('/api/session/switch', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({session_id:id}) });
    const saved = sessionStorage.getItem('lastChatHTML_' + id);
    if (saved) {
      messagesDiv.innerHTML = saved;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } else {
      await loadHistory(id);
    }
    loadSessions();
    chatArea.style.display = 'flex';
    homeScreen.style.display = 'none';
  }
  async function loadHistory(id) {
    const resp = await fetch('/api/session/' + id + '/history');
    const data = await resp.json();
    messagesDiv.innerHTML = '';
    (data.history||[]).forEach(m => addMsg(m.role, m.content));
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    if (id && id !== 'new') {
      sessionStorage.setItem('lastChatHTML_' + id, messagesDiv.innerHTML);
    }
  }
  async function newSession() {
    if (currentSessionId && currentSessionId !== 'new') {
      sessionStorage.setItem('lastChatHTML_' + currentSessionId, messagesDiv.innerHTML);
    }
    lastSessionId = currentSessionId;
    currentSessionId = 'new';
    messagesDiv.innerHTML = '';
    sessionStorage.removeItem('newChatHTML');
    chatArea.style.display = 'flex';
    homeScreen.style.display = 'none';
    userInput.focus();
  }
  async function delSession(id) {
    if (!confirm(L[lang].delConfirm)) return;
    await fetch('/api/session/' + id, { method:'DELETE' });
    if (currentSessionId === id) { currentSessionId = null; messagesDiv.innerHTML = ''; }
    if (lastSessionId === id) { lastSessionId = null; }
    await loadSessions();
  }

  homeBtn.onclick = async () => {

        sessionStorage.setItem('lastChatHTML_' + currentSessionId, messagesDiv.innerHTML);

        sessionStorage.setItem('newChatHTML', messagesDiv.innerHTML);
      }

      chatArea.style.display = 'none';
      homeScreen.style.display = 'flex';
      loadSessions();
      loadTaskDashboard();

      await loadSessions();
      if (lastSessionId && sessionIdList.includes(lastSessionId)) {

        await switchSess(sessionIdList[0]);
      } else {
        newSession();
        const saved = sessionStorage.getItem('newChatHTML');
        if (saved) messagesDiv.innerHTML = saved;
      }
    }
  };

      const metrics = metricsResp.status === 'fulfilled' ? metricsResp.value : null;
      const workflow = workflowResp.status === 'fulfilled' ? workflowResp.value : null;

      const uptimeStr = uptimeMin < 60 ? uptimeMin + t.min : Math.floor(uptimeMin/60) + t.hr + (uptimeMin%60) + t.minShort;

        dashStats.innerHTML = newStatsHTML;
        requestAnimationFrame(() => { dashStats.style.opacity = '1'; });
      }

      if (metrics && metrics.system) {
        const cpu = metrics.system.cpu_percent || 0;

        const tokens = metrics.tokens ? metrics.tokens.total_today || 0 : 0;
        const cpuColor = cpu > 80 ? 'red' : cpu > 60 ? 'yellow' : 'green';

        sysResources.innerHTML = `
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:14px;"><span>${t.cpu}</span><span>${cpu}%</span></div>

          </div>

  async function sendMessage(text) {
    const query = (text || userInput.value).trim();
    const hasFiles = uploadedFiles.length > 0;
    if ((!query && !hasFiles) || currentAbortController) return;
    if (currentSessionId === 'new') {
      const resp = await fetch('/api/session/new', { method:'POST' });
      const data = await resp.json();
      currentSessionId = data.session_id;
      lastSessionId = currentSessionId;
      await loadSessions();
    }
    const displayContent = query || (hasFiles ? `[${L[lang].uploadedFiles} ${uploadedFiles.length} ${L[lang].filesCount}]` : '');
    addMsg('system', new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }));
    addMsg('user', displayContent);
    if (!text) userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.style.display = 'none'; stopBtn.style.display = 'flex'; editActions.style.display = 'none';
    currentAbortController = new AbortController();
    let assistantEl = null, thinkEl = null, thinkBody = null, fullResponse = '', thinkContent = '', thinkActive = false;

    function createThinkWrapper() {
      const t = L[lang];
      const wrapper = document.createElement('div');
      wrapper.className = 'think-wrapper';
      const header = document.createElement('div');
      header.className = 'think-header';
      header.innerHTML = `<span class="toggle-arrow">▼</span><span>${t.thinkLabel || '思考过程'}</span>`;
      header.onclick = () => {
        wrapper.classList.toggle('collapsed');
        const arrow = header.querySelector('.toggle-arrow');
        arrow.textContent = wrapper.classList.contains('collapsed') ? '▶' : '▼';
      };
      const body = document.createElement('div');
      body.className = 'think-body';
      wrapper.appendChild(header);
      wrapper.appendChild(body);
      thinkBody = body;
      return wrapper;
    }

    const filesToSend = [...uploadedFiles];
    uploadedFiles = [];
    renderUploadPreview();

    try {
      const body = { query: displayContent, stream: true, thinking_enabled: isDeepThinkOn, web_search: isWebSearchOn, session_id: currentSessionId || '' };
      if (filesToSend.length > 0) body.files = filesToSend;
      const resp = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body), signal: currentAbortController.signal });
      if (!resp.ok) throw new Error('Server error');
      const reader = resp.body.getReader(); const decoder = new TextDecoder(); let buffer = '';
      while (true) {
        const {done, value} = await reader.read(); if (done) break;
        buffer += decoder.decode(value,{stream:true}); const lines = buffer.split('\n'); buffer = lines.pop()||'';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let payload = line.slice(6);
          try { payload = JSON.parse(payload); } catch(e) {}
          if (payload === '[DONE]') continue;
          // State machine for parsing [THINK]...[/THINK] in streaming chunks
          // Markers may appear: alone, at start, at end, or mid-payload
          let remaining = payload;
          while (remaining.length > 0) {
            if (thinkActive) {
              const closeIdx = remaining.indexOf('[/THINK]');
              if (closeIdx === -1) {
                thinkContent += remaining;
                if (thinkBody) thinkBody.textContent = thinkContent;
                break;
              }
              // Closing marker found: split at [/THINK]
              thinkContent += remaining.slice(0, closeIdx);
              thinkActive = false;
              if (thinkBody) thinkBody.textContent = thinkContent;
              remaining = remaining.slice(closeIdx + 8); // skip past [/THINK]
              continue;
            }

            const openIdx = remaining.indexOf('[THINK]');
            if (openIdx === -1) {
              // No think markers: regular content
              if (!assistantEl) { assistantEl = addMsg('assistant', remaining); fullResponse = remaining; }
              else { fullResponse += remaining; try { assistantEl.innerHTML = marked.parse(fullResponse); } catch(e) {} }
              break;
            }

            // Text before [THINK] goes to assistant
            if (openIdx > 0) {
              const before = remaining.slice(0, openIdx);
              if (!assistantEl) { assistantEl = addMsg('assistant', before); fullResponse = before; }
              else { fullResponse += before; try { assistantEl.innerHTML = marked.parse(fullResponse); } catch(e) {} }
            }

            // Enter think mode
            thinkActive = true;
            thinkContent = '';
            if (!thinkEl) {
              thinkEl = createThinkWrapper();
              messagesDiv.appendChild(thinkEl);
            }
            remaining = remaining.slice(openIdx + 7); // skip past [THINK]

            // Check if closing marker is also in this remaining text
            const endIdx = remaining.indexOf('[/THINK]');
            if (endIdx !== -1) {
              thinkContent = remaining.slice(0, endIdx);
              thinkActive = false;
              if (thinkBody) thinkBody.textContent = thinkContent;
              remaining = remaining.slice(endIdx + 8);
              // continue loop to handle text after [/THINK]
            } else {
              thinkContent = remaining;
              if (thinkBody) thinkBody.textContent = thinkContent;
              break;
            }
          }
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
      }
      if (currentSessionId && currentSessionId !== 'new') {
        sessionStorage.setItem('lastChatHTML_' + currentSessionId, messagesDiv.innerHTML);
      }
      if (assistantEl) {
        const now = new Date();
        const ts = now.getFullYear() + '-' +
          String(now.getMonth()+1).padStart(2,'0') + '-' +
          String(now.getDate()).padStart(2,'0') + ' ' +
          String(now.getHours()).padStart(2,'0') + ':' +
          String(now.getMinutes()).padStart(2,'0') + ':' +
          String(now.getSeconds()).padStart(2,'0');
        const endMarker = document.createElement('div');
        endMarker.className = 'msg-end-marker';
        endMarker.innerHTML = `
          <div class="msg-end-separator">——</div>
          <div class="msg-end-info">SEAI · ${ts}</div>
        `;
        assistantEl.insertAdjacentElement('afterend', endMarker);

        const msgId = assistantEl.dataset.msgId || 'msg_final';
        const actionBar = document.createElement('div');
        actionBar.className = 'message-actions';
        actionBar.innerHTML = `
          <button class="fb-btn" data-rate="up"><img src="ui/good.png" alt="赞"></button>
          <button class="fb-btn" data-rate="down"><img src="ui/bad.png" alt="踩"></button>
          <button class="copy-btn" title="复制回复"><img src="ui/copy.png" alt="复制"></button>`;
        actionBar.querySelectorAll('.fb-btn').forEach(btn => {
          btn.onclick = (e) => {
            e.stopPropagation();
            showRatingPopup(btn, msgId);
          };
        });
        actionBar.querySelector('.copy-btn').onclick = () => {
          navigator.clipboard.writeText(fullResponse).then(() => toast(L[lang].copied, 'success'));
        };
        endMarker.insertAdjacentElement('afterend', actionBar);
      }
      if (currentSessionId && currentSessionId!=='new') {
        fetch('/api/session/auto_title',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:currentSessionId})}).finally(()=>loadSessions());
      }
    } catch(err) {
      if (err.name==='AbortError') addMsg('system', L[lang].stopped);
      else addMsg('system', L[lang].netError);
    } finally { sendBtn.style.display='flex'; stopBtn.style.display='none'; currentAbortController = null; }
  }

  async function loadMemoryGraph() {
    const t = L[lang];
    try {
      const resp = await fetch('/api/memory/graph');
      const data = await resp.json();
      const container = document.getElementById('memoryGraph');
      container.innerHTML = '';
      if (!data.nodes || data.nodes.length === 0) {
        container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">' + t.noMemory + '</p>';
        return;
      }
      const w = container.clientWidth, h = container.clientHeight || 350;
      const svg = d3.select("#memoryGraph").append("svg").attr("width", w).attr("height", h);
      const g = svg.append("g");
      const nodes = data.nodes.map(d => ({...d}));
      const edges = data.edges.map(d => ({...d}));
      const sim = d3.forceSimulation(nodes).force("link", d3.forceLink(edges).id(d => d.id).distance(80))
        .force("charge", d3.forceManyBody().strength(-200)).force("center", d3.forceCenter(w/2, h/2)).force("collide", d3.forceCollide(15));
      const link = g.selectAll("line").data(edges).join("line").attr("stroke", "var(--border)").attr("stroke-width", d => Math.min(d.weight || 1, 3));
      const node = g.selectAll("g").data(nodes).join("g")
        .style("cursor", "grab")
        .call(d3.drag()
          .on("start", function(e,d) { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; d3.select(this).style("cursor","grabbing"); })
          .on("drag", function(e,d) { d.fx = e.x; d.fy = e.y; })
          .on("end", function(e,d) { if(!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; d3.select(this).style("cursor","grab"); }));
      node.append("circle").attr("r", d => d.importance ? 3 + d.importance * 3 : 6).attr("fill", d => d.type === 'code' ? '#9ece6a' : '#0066FF').attr("stroke", "#fff").attr("stroke-width", 1);
      node.append("text").text(d => d.text ? d.text.substring(0, 15) + (d.text.length > 15 ? '...' : '') : d.id).attr("font-size", "10px").attr("dx", 8).attr("dy", 4).attr("fill", "var(--text)");
      sim.on("tick", () => { link.attr("x1", d=>d.source.x).attr("y1", d=>d.source.y).attr("x2", d=>d.target.x).attr("y2", d=>d.target.y); node.attr("transform", d => `translate(${d.x},${d.y})`); });

      const zoom = d3.zoom()
        .scaleExtent([0.1, 2])
        .on("zoom", (e) => { g.attr("transform", e.transform); });
      svg.call(zoom);
    } catch(e) { document.getElementById('memoryGraph').innerHTML = '<p style="color:var(--red);text-align:center;padding:20px;">' + L[lang].memoryFailed + '</p>'; }
  }

  document.getElementById('backupBtn').onclick = async () => {
    const t = L[lang];
    try {
      const resp = await fetch('/api/backup', { method:'POST' });
      const data = await resp.json();
      if (data.path) toast(t.backupSuccess + ': ' + data.path, 'success');
      else toast(t.backupSuccess, 'success');
    } catch(e) { toast(t.backupFailed + e.message, 'error'); }
  };

  async function loadEndpoints() {
    const t = L[lang];
    try {
      const resp = await fetch('/api/endpoints');
      const data = await resp.json();
      const endpoints = data.endpoints || [];
      const container = document.getElementById('endpointList');
      container.innerHTML = endpoints.map(e => {
        const escapedName = String(e.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
        <div class="endpoint-item">
          <div class="endpoint-info">
            <div style="font-weight:600;">${e.name || '未命名'}</div>
            <div style="font-size:14px;color:var(--text-secondary);">${e.base_url || ''} | ${e.model || ''}</div>
          </div>
          <button class="delete-btn endpoint-delete-btn" data-name="${escapedName}"><img src="ui/delete.png" style="width:20px;height:20px;"></button>
        </div>`;
      }).join('') || '<div style="color:var(--text-secondary);padding:12px;">' + t.noEndpoints + '</div>';
      container.querySelectorAll('.endpoint-delete-btn').forEach(btn => {
        btn.onclick = async () => {
          const name = btn.dataset.name;
          try {
            await fetch('/api/endpoints/' + encodeURIComponent(name), { method:'DELETE' });
            loadEndpoints();
          } catch(e) { toast(t.apiDelFailed + e.message, 'error'); }
        };
      });
    } catch(e) {}
  }

  document.getElementById('addEndpointBtn').onclick = () => document.getElementById('addEndpointModal').classList.add('active');
  document.getElementById('closeAddEndpointModal').onclick = () => document.getElementById('addEndpointModal').classList.remove('active');

  function loadApiTemplates() {
    const templates = [
      { name: 'DeepSeek', base: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
      { name: 'OpenAI', base: 'https://api.openai.com/v1', model: 'gpt-4o' },
      { name: 'Ollama', base: 'http://localhost:11434/v1', model: 'llama3' },
      { name: 'Groq', base: 'https://api.groq.com/openai/v1', model: 'llama-3.1-70b-versatile' },
      { name: 'Together', base: 'https://api.together.xyz/v1', model: 'meta-llama/Llama-3-70b-chat-hf' },
      { name: 'OpenRouter', base: 'https://openrouter.ai/api/v1', model: 'openai/gpt-4o' },
      { name: 'DeepSeek-Pro', base: 'https://api.deepseek.com/v1', model: 'deepseek-reasoner' },
      { name: 'Mistral', base: 'https://api.mistral.ai/v1', model: 'mistral-large-latest' },
    ];
    const container = document.getElementById('apiTemplates');
    container.innerHTML = templates.map(t => {
      const escapedName = String(t.name).replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<button class="template-btn" data-name="${escapedName}" data-base="${t.base}" data-model="${t.model}">${t.name}</button>`;
    }).join('');
    container.querySelectorAll('.template-btn').forEach(btn => {
      btn.onclick = () => {
        document.getElementById('endpointName').value = btn.dataset.name;
        document.getElementById('endpointBase').value = btn.dataset.base;
        document.getElementById('endpointModel').value = btn.dataset.model;
        document.getElementById('addEndpointModal').classList.add('active');
      };
    });
  }
  loadApiTemplates();
  document.getElementById('confirmAddEndpoint').onclick = async () => {
    const t = L[lang];
    const name = document.getElementById('endpointName').value.trim();
    const base = document.getElementById('endpointBase').value.trim();
    const key = document.getElementById('endpointKey').value.trim();
    const model = document.getElementById('endpointModel').value.trim();
    if (!name || !base || !key || !model) { toast(t.fillAllFields, 'error'); return; }
    try {
      await fetch('/api/endpoints', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, base_url:base, api_key:key, model}) });
      toast(t.apiAdded, 'success');
      document.getElementById('addEndpointModal').classList.remove('active');
      loadEndpoints();
    } catch(e) { toast(t.apiAddFailed + e.message, 'error'); }
  };

  async function loadWhitelist() {
    const t = L[lang];
    try {
      const resp = await fetch('/api/whitelist');
      const data = await resp.json();
      whitelist = data.paths || whitelist;
      const container = document.getElementById('whitelistList');
      container.innerHTML = whitelist.map((p, i) => {
        const escapedPath = String(p).replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
        <div class="whitelist-item">
          <span>${p}</span>
          <button class="delete-btn whitelist-delete-btn" data-path="${escapedPath}"><img src="ui/delete.png" style="width:20px;height:20px;"></button>
        </div>`;
      }).join('') || '<div style="color:var(--text-secondary);padding:12px;">' + t.noWhitelist + '</div>';
      container.querySelectorAll('.whitelist-delete-btn').forEach(btn => {
        btn.onclick = async () => {
          const path = btn.dataset.path;
          try {
            await fetch('/api/whitelist/remove', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({path}) });
            loadWhitelist();
          } catch(e) { toast(t.whitelistDelFailed + e.message, 'error'); }
        };
      });
    } catch(e) {}
  }

  document.getElementById('browseWhitelistBtn').onclick = async () => {
    try {
      if (window.seaiWindow && window.seaiWindow.pickDirectory) {
        const dir = window.seaiWindow.pickDirectory();
        if (dir) { document.getElementById('newWhitelistPath').value = dir; }
      }
    } catch(e) { toast('目录选择失败: ' + e.message, 'error'); }
  };

  document.getElementById('addWhitelistBtn').onclick = async () => {
    const t = L[lang];
    const path = document.getElementById('newWhitelistPath').value.trim();
    if (!path) { toast(t.enterPath, 'error'); return; }
    if (whitelist.length >= 8) { toast(t.whitelistMax, 'error'); return; }
    try {
      await fetch('/api/whitelist/add', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({path}) });
      whitelist.push(path);
      document.getElementById('newWhitelistPath').value = '';
      loadWhitelist();
      toast(t.added, 'success');
    } catch(e) { toast(t.addFailed + e.message, 'error'); }
  };

  document.getElementById('saveApiBtn').onclick = async () => {
    const t = L[lang];
    const baseUrl = document.getElementById('apiBaseUrl').value.trim();
    if (!baseUrl) { toast(t.enterApiBase, 'error'); return; }
    try {
      await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({api_base_url: baseUrl}) });
      toast(t.apiConfigSaved, 'success');
    } catch(e) { toast(t.saveFailed + e.message, 'error'); }
  };

  document.getElementById('saveSettingsBtn').onclick = () => {
    toast(L[lang].settingsSaved, 'success');
    document.getElementById('settingsModal').classList.remove('active');
  };

  async function renderBackupSettings() {
    const t = L[lang];
    const section = document.getElementById('backupSettingsSection');
    if (!section) return;
    try {
      const backupCfg = await fetch('/api/backup/config').then(r => r.json());
      const enabled = backupCfg.enabled || false;
      const repoUrl = (backupCfg.repo_url || '').replace(/`/g, '\\`').replace(/\$/g, '\\$').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const token = (backupCfg.github_token || '').replace(/`/g, '\\`').replace(/\$/g, '\\$').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const lastBackup = backupCfg.last_backup;
      const lastStatus = backupCfg.last_status;
      const disabledAttr = enabled ? '' : 'disabled';
      const statusClass = lastStatus === 'success' ? 'success' : lastStatus === 'failed' ? 'failed' : 'none';
      const statusText = lastStatus === 'success' ? `${t.backupLastSuccess}${lastBackup}` : lastStatus === 'failed' ? t.backupLastFailed : t.backupNever;
      section.innerHTML = `
        <div class="backup-toggle">
          <span class="backup-toggle-label">${t.backupToggleLabel}</span>
          <label class="switch">
            <input type="checkbox" id="backupEnabled" ${enabled ? 'checked' : ''} onchange="SEAI.toggleBackup(this.checked)">
            <span class="slider"></span>
          </label>
        </div>
        <div class="backup-field">
          <label>${t.backupRepoLabel}</label>
          <input type="text" id="backupRepoUrl" value="${repoUrl}" placeholder="https://github.com/用户名/仓库名" ${disabledAttr} onblur="SEAI.validateRepoPath()">
          <div class="hint" id="backupRepoHint">${disabledAttr ? t.backupRepoHintDisabled : t.backupRepoHint}</div>
        </div>
        <div class="backup-field">
          <label>${t.backupTokenLabel}</label>
          <input type="password" id="backupToken" value="${token}" placeholder="ghp_xxxxxxxxxxxx" ${disabledAttr}>
          <div class="hint">${t.backupTokenHint}</div>
        </div>
        ${lastBackup ? `<div class="backup-status ${statusClass}">${statusText}</div>` : ''}
        <button class="btn-backup" id="btnRunBackup" ${!enabled || !repoUrl ? 'disabled' : ''} onclick="SEAI.runBackup()">${t.backupRunBtn}</button>
      `;
    } catch(e) { section.innerHTML = '<div style="color:var(--text-secondary);padding:12px;">' + t.backupCfgFailed + '</div>'; }
  }

  async function toggleBackup(enabled) {
    const t = L[lang];
    if (enabled) {
      const repoInput = document.getElementById('backupRepoUrl');
      const repoUrl = repoInput ? repoInput.value.trim() : '';
      if (!repoUrl) {
        toast(t.backupNeedPath, 'error');
        renderBackupSettings();
        return;
      }
      try {
        const validation = await fetch('/api/backup/validate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ repo_url: repoUrl })
        }).then(r => r.json());
        if (!validation.valid) {
          toast(t.backupPathInvalid + validation.error, 'error');
          renderBackupSettings();
          return;
        }
      } catch {
        toast(t.backupValidateFailed, 'error');
        renderBackupSettings();
        return;
      }
    }
    try {
      await fetch('/api/backup/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled })
      });
      toast(enabled ? t.backupEnabled : t.backupDisabled, 'success');
    } catch (e) {
      toast(t.opFailed + e.message, 'error');
    }
    renderBackupSettings();
  }

  async function validateRepoPath() {
    const t = L[lang];
    const input = document.getElementById('backupRepoUrl');
    const hint = document.getElementById('backupRepoHint');
    if (!input || !hint) return;
    const repoUrl = input.value.trim();
    if (!repoUrl) {
      hint.className = 'hint';
      hint.textContent = t.backupRepoHint;
      return;
    }
    try {
      const result = await fetch('/api/backup/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repo_url: repoUrl })
      }).then(r => r.json());
      if (result.valid) {
        hint.className = 'success';
        hint.textContent = t.backupPathValid;
        input.value = result.normalized || repoUrl;
        saveBackupField('repo_url', input.value);
      } else {
        hint.className = 'error';
        hint.textContent = t.backupPathError + result.error;
      }
    } catch {
      hint.className = 'error';
      hint.textContent = t.backupValidateFailed;
    }
  }

  async function saveBackupField(field, value) {
    try {
      const body = {};
      body[field] = value;
      await fetch('/api/backup/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    } catch {}
  }

  async function runBackup() {
    const t = L[lang];
    const btn = document.getElementById('btnRunBackup');
    if (btn) { btn.disabled = true; btn.textContent = t.backupRunning; }
    try {
      const result = await fetch('/api/backup/run', { method: 'POST' }).then(r => r.json());
      toast(result.message || t.backupSuccess, 'success');
    } catch (e) {
      toast(t.backupFailed + e.message, 'error');
    }
    renderBackupSettings();
  }

  function toast(msg, type = 'info') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => { el.remove(); }, 3000);
  }

  const ratingState = {};
  function showRatingPopup(triggerBtn, msgId) {
    const popup = document.getElementById('ratingPopup');
    const currentLabel = document.getElementById('ratingCurrentLabel');
    const currentRate = ratingState[msgId];
    if (currentRate) {
      currentLabel.textContent = '当前评价: ' + (currentRate === 'up' ? '👍 有用' : '👎 无用') + ' | 可重新选择';
    } else {
      currentLabel.textContent = '请选择评价';
    }
    const rect = triggerBtn.getBoundingClientRect();
    popup.style.top = (rect.bottom + 8) + 'px';
    popup.style.left = Math.min(rect.left, window.innerWidth - 220) + 'px';
    popup.classList.add('active');
    popup.querySelectorAll('.rating-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.rate === currentRate);
      opt.onclick = () => {
        const rate = opt.dataset.rate;
        ratingState[msgId] = rate;
        fetch('/api/feedback', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message_id: msgId, rate}) });
        popup.classList.remove('active');
        toast(rate === 'up' ? '已评价：有用 👍' : '已评价：无用 👎', 'success');
      };
    });
    setTimeout(() => {
      const closePopup = (e) => { if (!popup.contains(e.target) && e.target !== triggerBtn) { popup.classList.remove('active'); document.removeEventListener('click', closePopup); } };
      document.addEventListener('click', closePopup);
    }, 0);
  }

  function handleFileSelect(event) {
    const files = Array.from(event.target.files);
    addFiles(files);
    event.target.value = '';
  }

  function addFiles(files) {
    for (const file of files) {
      if (!file.type.startsWith('image/') && !file.type.startsWith('audio/')) continue;
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedFiles.push({ name: file.name, type: file.type, data: e.target.result });
        renderUploadPreview();
      };
      reader.readAsDataURL(file);
    }
  }

  function removeFile(index) {
    uploadedFiles.splice(index, 1);
    renderUploadPreview();
  }

  function renderUploadPreview() {
    const container = document.getElementById('uploadPreview');
    container.innerHTML = uploadedFiles.map((f, i) => {
      if (f.type.startsWith('image/')) {
        return `<div class="upload-preview-item"><img src="${f.data}" alt="${f.name}"><button class="remove-btn" onclick="SEAI.removeFile(${i})">✕</button></div>`;
      }
      return `<div class="upload-preview-item"><div class="file-icon">🎵</div><button class="remove-btn" onclick="SEAI.removeFile(${i})">✕</button></div>`;
    }).join('');
  }

  document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').onchange = handleFileSelect;

  document.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    const files = [];
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        files.push(item.getAsFile());
      }
    }
    if (files.length > 0) addFiles(files);
  });

  // 所有弹窗点击空白处不关闭（需使用明确的关闭按钮）

  initTheme();
  initLang();
  loadSessions();

  window.SEAI = {
    toggleBackup, validateRepoPath, runBackup,
    removeFile, toast
  };

  function initWindowControls() {
    const winMinBtn = document.getElementById('winMinBtn');
    const winCloseBtn = document.getElementById('winCloseBtn');
    const splitter = document.getElementById('panelSplitter');
    const rightPanel = document.getElementById('rightPanel');
    const topbar = document.getElementById('topbar');

    // 预设置回退（bridge 连接后会被覆盖）
    if (winMinBtn) winMinBtn.onclick = function() { /* 最小化需要桥接 */ };
    if (winCloseBtn) winCloseBtn.onclick = function() { try { window.close(); } catch(e) {} };

    let _seaiBridge = null;

    function setupBridge(channel) {
      const seaiWindow = channel.objects.seaiWindow;
      if (!seaiWindow) return;
      _seaiBridge = seaiWindow;
      window._seaiBridge = seaiWindow;

      // 按钮回退（原生 Qt 按钮优先，这里作为备用）
      if (winMinBtn) winMinBtn.onclick = function() { seaiWindow.minimize(); };
      if (winCloseBtn) winCloseBtn.onclick = function() { seaiWindow.close(); };
    }

    // 顶层 mousedown 拖拽处理器 — 调用 QWindow::startSystemMove()
    if (topbar) {
      topbar.addEventListener('mousedown', function(e) {
        if (e.target.closest('button') || e.target.closest('.win-ctrl')) return;
        if (e.target.closest('.topbar-left') || e.target.closest('.topbar-right')) return;
        const bridge = _seaiBridge || window._seaiBridge;
        if (bridge && bridge.startSystemMove) {
          try { bridge.startSystemMove(); } catch(_) {}
        }
      });
    }

    if (splitter && rightPanel) {
      var isDragging = false;
      var startX = 0;
      var startWidth = 0;
      var savedWidth = localStorage.getItem('rightPanelWidth');

      if (savedWidth) {
        var w = parseInt(savedWidth, 10);
        if (w >= 170 && w <= 380) {
          rightPanel.style.flex = '0 0 ' + w + 'px';
          rightPanel.style.width = w + 'px';
        }
      }

      function onDown(e) {
        isDragging = true;
        startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        startWidth = rightPanel.offsetWidth;
        splitter.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        var cx = e.clientX || (e.touches && e.touches[0].clientX) || 0;
        var dx = startX - cx;
        var newWidth = startWidth + dx;
        newWidth = Math.max(170, Math.min(380, newWidth));
        rightPanel.style.flex = '0 0 ' + newWidth + 'px';
        rightPanel.style.width = newWidth + 'px';
      }

      function onUp() {
        if (!isDragging) return;
        isDragging = false;
        splitter.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        localStorage.setItem('rightPanelWidth', rightPanel.offsetWidth);
      }

      splitter.addEventListener('mousedown', onDown);
      splitter.addEventListener('touchstart', onDown, {passive: false});
      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, {passive: false});
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchend', onUp);
    }

    if (typeof QWebChannel !== 'undefined') {
      new QWebChannel(qt.webChannelTransport, setupBridge);
    }
  }

  function tryInitWindowControls(retries) {
    retries = retries || 0;
    if (typeof qt !== 'undefined' && qt.webChannelTransport) {
      initWindowControls();
      return;
    }
    if (retries < 60) {
      setTimeout(function() { tryInitWindowControls(retries + 1); }, 250);
    }
  }

  tryInitWindowControls();
})();
</script>
</body>
